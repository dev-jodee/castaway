name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: program-id
    attributes:
      label: Program ID (if applicable)
      description: The Solana program address you were trying to fetch or generate for
      placeholder: e.g. JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Fetch IDL
        - Generate SDK
        - UI / display issue
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Enter ...
        3. Click ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 123, macOS 14
    validations:
      required: false
