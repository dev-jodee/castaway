name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Please be as specific as possible.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the frustration or limitation you're running into
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches you thought of?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - IDL fetching
        - SDK generation
        - Preset programs
        - UI / UX
        - Developer experience
        - Other
    validations:
      required: true
