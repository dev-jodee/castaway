name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npx prettier --check .

      - name: Lint (ESLint)
        run: npx eslint .

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: npm run build
